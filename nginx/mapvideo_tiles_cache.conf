# http-context include (e.g. /etc/nginx/conf.d/mapvideo_tiles_cache.conf)
# Required by `proxy_cache mapvideo_tiles_cache` in server location /tiles/.
proxy_cache_path /var/cache/nginx/mapvideo_tiles
  levels=1:2
  keys_zone=mapvideo_tiles_cache:512m
  max_size=10g
  inactive=30d
  use_temp_path=off;
